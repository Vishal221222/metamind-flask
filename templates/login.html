<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | MetaMind</title>


 
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}" />
 
</head>
<body>

  <main class="login-page">

    <nav class="navbar">
      <div class="logo">◆ MetaMind</div>

      <div class="nav-actions">
        <a href="/">Home</a>
        <a href="/Register" class="nav-register">Register</a>
      </div>
    </nav>

    <section class="login-container">

      <div class="login-card">

        <span class="login-badge">WELCOME BACK</span>

        <h1>Login to MetaMind</h1>

        <p class="login-subtitle">
          Continue exploring psychology, philosophy, economics, biology,
          history, AI ethics, and more.
        </p>
        {%if error%}
        <div class="error-box">
    {{ error }}
  </div>
{% endif %}

        <form action="/Login" method="POST">

          <div class="input-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required />
          </div>

          <div class="form-options">
            <label class="remember-box">
              <input type="checkbox" />
              <span>Remember me</span>
            </label>

            <a href="#">Forgot Password?</a>
          </div>

          <button type="submit" class="login-btn">Login</button>

        </form>

        <p class="switch-text">
          Don’t have an account?
          <a href="/Register">Create Account</a>
        </p>

      </div>

    </section>

  </main>

</body>
</html>
